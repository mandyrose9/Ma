<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Banking Demo</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
  <div class="header">Fintech Banking Demo</div>

  <div id="login" class="page active">
    <div class="card">
      <h2>Login</h2>
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <div class="password-toggle" onclick="togglePassword()">Show / Hide Password</div>
      <button onclick="login()">Login</button>
    </div>
  </div>

  <div id="dashboard" class="page">

    <div class="accounts-grid">

      <div class="card">
        <h3>Katherine</h3>
        <p>Checking Account</p>
        <div class="balance" id="checkingBalance">$56,780</div>
        <button onclick="deposit()">Deposit $500</button>
        <button onclick="withdraw()">Withdraw $200</button>
        <button onclick="transferToSavings()">Transfer $300 → Savings</button>
      </div>

      <div class="card">
        <h3>Katherine</h3>
        <p>Savings Account</p>
        <div class="balance" id="savingsBalance">$14,200</div>
        <button onclick="transferToChecking()">Transfer $300 → Checking</button>
      </div>

    </div>

    <div class="card">
      <h3>Spending Overview</h3>
      <canvas id="chart"></canvas>
    </div>

  </div>

  <div id="cards" class="page">
    <div class="card">
      <h3>Debit Card</h3>
      <p>**** **** **** 6634</p>
      <p>Status: <span id="cardStatus">Frozen</span></p>
      <button onclick="freeze()">Freeze / Unfreeze Card</button>
    </div>
  </div>

  <div id="transactions" class="page">
    <div class="card">
      <h3>Recent Activity (Demo)</h3>
      <div id="transactionList" class="transaction-list"></div>
    </div>
  </div>

  <div id="settings" class="page">
    <div class="card">
      <h3>Account Info</h3>
      <p>Name: Katherine</p>
      <p>Status: Active</p>
      <p>Account Type: Checking & Savings</p>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="nav">
    <button onclick="showPage('dashboard')">Home</button>
    <button onclick="showPage('cards')">Cards</button>
    <button onclick="showPage('transactions')">Activity</button>
    <button onclick="showPage('settings')">Settings</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
